<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Sách - REST API</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 12px 24px;
        border: none;
        background: rgb(114, 124, 181);
        cursor: pointer;
        border-radius: 8px;
        font-size: 1em;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .tab-btn.active {
        background: #667eea;
        color: white;
      }

      .tab-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .tab-content {
        display: none;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .tab-content.active {
        display: block;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1em;
        transition: border-color 0.3s ease;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        padding: 12px 24px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #764ba2;
        transform: translateY(-2px);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .data-display {
        margin-top: 30px;
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
      }

      .data-display h3 {
        margin-bottom: 15px;
        color: #333;
      }

      .item {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-left: 4px solid #667eea;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .item-actions {
        display: flex;
        gap: 10px;
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 0.85em;
      }

      .btn-delete {
        background: #e74c3c;
      }

      .btn-delete:hover {
        background: #c0392b;
      }

      .btn-edit {
        background: #f39c12;
      }

      .btn-edit:hover {
        background: #d68910;
      }

      .alert {
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📚 Quản Lý Sách</h1>
      </header>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('authors')">
          👤 Tác Giả
        </button>
        <button class="tab-btn" onclick="switchTab('books')">📖 Sách</button>
        <button class="tab-btn" onclick="switchTab('prices')">
          💰 Giá Sách
        </button>
      </div>

      <!-- TAC GIA TAB -->
      <div id="authors" class="tab-content active">
        <h2>Quản Lý Tác Giả</h2>

        <div class="form-group">
          <label>Tên Tác Giả:</label>
          <input type="text" id="authorName" placeholder="Nhập tên tác giả" />
        </div>

        <div class="form-group">
          <label>Tiểu Sử / Quốc Tịch:</label>
          <textarea id="authorBio" placeholder="Nhập tiểu sử"></textarea>
        </div>

        <button onclick="addAuthor()">Thêm Tác Giả</button>

        <div class="data-display">
          <h3>Danh Sách Tác Giả</h3>
          <div id="authorsList" class="loading"></div>
        </div>
      </div>

      <!-- SACH TAB -->
      <div id="books" class="tab-content">
        <h2>Quản Lý Sách</h2>

        <div class="form-group">
          <label>Tiêu Đề:</label>
          <input type="text" id="bookTitle" placeholder="Nhập tiêu đề sách" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Năm Xuất Bản:</label>
            <input type="number" id="bookYear" placeholder="Ví dụ: 2023" />
          </div>
          <div class="form-group">
            <label>Mã Thể Loại:</label>
            <input type="number" id="bookCategory" placeholder="Ví dụ: 1" />
          </div>
        </div>

        <button onclick="addBook()">Thêm Sách</button>

        <div class="form-group" style="margin-top: 30px">
          <label>Tìm Kiếm Sách:</label>
          <input type="text" id="searchKeyword" placeholder="Nhập từ khóa..." />
          <button onclick="searchBooks()" style="margin-top: 10px">
            Tìm Kiếm
          </button>
        </div>

        <div class="data-display">
          <h3>Danh Sách Sách</h3>
          <div id="booksList" class="loading"></div>
        </div>
      </div>

      <!-- GIA SACH TAB -->
      <div id="prices" class="tab-content">
        <h2>Quản Lý Giá Sách</h2>

        <div class="form-row">
          <div class="form-group">
            <label>ID Sách:</label>
            <input type="number" id="priceBookId" placeholder="Nhập ID sách" />
          </div>
          <div class="form-group">
            <label>Giá (VND):</label>
            <input type="number" id="priceValue" placeholder="Nhập giá" />
          </div>
        </div>

        <button onclick="updatePrice()">Cập Nhật Giá</button>

        <div class="form-row" style="margin-top: 30px">
          <div class="form-group">
            <label>Giá Tối Thiểu:</label>
            <input type="number" id="minPrice" placeholder="VND" />
          </div>
          <div class="form-group">
            <label>Giá Tối Đa:</label>
            <input type="number" id="maxPrice" placeholder="VND" />
          </div>
        </div>
        <button onclick="searchByPrice()">Tìm Sách Theo Giá</button>

        <div class="form-group" style="margin-top: 30px">
          <button
            onclick="getCheapestBook()"
            style="background: #16a085; width: auto; margin-right: 10px"
          >
            Sách Rẻ Nhất
          </button>
          <button
            onclick="getMostExpensiveBook()"
            style="background: #8b0000; width: auto"
          >
            Sách Đắt Nhất
          </button>
        </div>

        <div class="data-display">
          <h3>Giá Các Sách</h3>
          <div id="pricesList" class="loading"></div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8080/api";

      // Switch between tabs
      function switchTab(tabName) {
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        document.getElementById(tabName).classList.add("active");
        event.target.classList.add("active");
      }

      // AUTHOR FUNCTIONS
      async function addAuthor() {
        const name = document.getElementById("authorName").value;
        const bio = document.getElementById("authorBio").value;

        if (!name || !bio) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/authors`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              authorName: name,
              nationality: bio,
            }),
          });

          if (response.ok) {
            alert("Thêm tác giả thành công!");
            document.getElementById("authorName").value = "";
            document.getElementById("authorBio").value = "";
            loadAuthors();
          } else {
            alert("Lỗi khi thêm tác giả!");
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function loadAuthors() {
        try {
          const response = await fetch(`${API_URL}/authors`);
          const authors = await response.json();

          let html = "";
          if (authors.length === 0) {
            html = "<p>Không có tác giả nào.</p>";
          } else {
            authors.forEach((author) => {
              html += `
                            <div class="item">
                                <div>
                                    <strong>ID: ${author.id}</strong> | <strong>${author.authorName}</strong>
                                    <p style="margin-top: 5px; color: #666;">${author.nationality}</p>
                                </div>
                                <div class="item-actions">
                                <button class="btn-small btn-edit" onclick="editAuthor(${author.id}, '${author.authorName}', '${author.nationality}')">
                                  Sửa
                                </button>

                                <button class="btn-small btn-delete" onclick="deleteAuthor(${author.id})">
                                  Xóa
                                </button>
                                </div>
                            </div>
                        `;
            });
          }
          document.getElementById("authorsList").innerHTML = html;
        } catch (error) {
          console.error(error);
          document.getElementById("authorsList").innerHTML =
            '<p style="color: red;">Lỗi kết nối!</p>';
        }
      }

      async function deleteAuthor(id) {
        if (!confirm("Bạn chắc chắn muốn xóa?")) return;

        try {
          const response = await fetch(`${API_URL}/authors/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("Xóa thành công!");
            loadAuthors();
          }
        } catch (error) {
          console.error(error);
        }
      }

      async function editAuthor(id, oldName, oldBio) {
        const newName = prompt("Nhập tên mới:", oldName);
        const newBio = prompt("Nhập quốc tịch mới:", oldBio);

        if (!newName || !newBio) return;

        try {
          const response = await fetch(`${API_URL}/authors/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              authorName: newName,
              nationality: newBio,
            }),
          });

          if (response.ok) {
            alert("Cập nhật thành công!");
            loadAuthors();
          } else {
            alert("Cập nhật thất bại!");
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      // BOOK FUNCTIONS
      async function addBook() {
        const title = document.getElementById("bookTitle").value;
        const year = document.getElementById("bookYear").value;
        const category = document.getElementById("bookCategory").value;

        if (!title || !year || !category) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/books`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: title,
              publishedYear: parseInt(year),
              authorId: parseInt(category),
            }),
          });

          if (response.ok) {
            alert("Thêm sách thành công!");
            document.getElementById("bookTitle").value = "";
            document.getElementById("bookYear").value = "";
            document.getElementById("bookCategory").value = "";
            loadBooks();
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function loadBooks() {
        try {
          const response = await fetch(`${API_URL}/books`);
          const books = await response.json();

          let html = "";
          if (books.length === 0) {
            html = "<p>Không có sách nào.</p>";
          } else {
            books.forEach((book) => {
              html += `
                            <div class="item">
                                <div>
                                    <strong>ID: ${book.id}</strong> | <strong>${book.title}</strong>
                                    <p style="margin-top: 5px; color: #666;">Năm: ${book.publishedYear}</p>
                                </div>
                                <div class="item-actions">
                                    <button class="btn-small btn-edit" onclick="editBook(${book.id}, '${book.title}', ${book.publishedYear})">
                                        Sửa
                                    </button>
                                    <button class="btn-small btn-delete" onclick="deleteBook(${book.id})">
                                        Xóa
                                    </button>
                                </div>
                            </div>
                        `;
            });
          }
          document.getElementById("booksList").innerHTML = html;
        } catch (error) {
          console.error(error);
          document.getElementById("booksList").innerHTML =
            '<p style="color: red;">Lỗi kết nối!</p>';
        }
      }

      async function searchBooks() {
        const keyword = document.getElementById("searchKeyword").value;
        if (!keyword) {
          alert("Nhập từ khóa tìm kiếm!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/books/search/${keyword}`);
          const books = await response.json();

          let html = "";
          if (books.length === 0) {
            html = "<p>Không tìm thấy sách nào!</p>";
          } else {
            books.forEach((book) => {
              html += `<div class="item"><strong>${book.title}</strong> (${book.publishedYear})</div>`;
            });
          }
          document.getElementById("booksList").innerHTML = html;
        } catch (error) {
          console.error(error);
        }
      }

      async function deleteBook(id) {
        if (!confirm("Bạn chắc chắn muốn xóa?")) return;

        try {
          const response = await fetch(`${API_URL}/books/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("Xóa thành công!");
            loadBooks();
          }
        } catch (error) {
          console.error(error);
        }
      }
      async function editAuthor(id, oldName, oldBio) {
        const newName = prompt("Nhập tên mới:", oldName);
        const newBio = prompt("Nhập quốc tịch mới:", oldBio);

        if (!newName || !newBio) return;

        try {
          const response = await fetch(`${API_URL}/authors/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              authorName: newName,
              nationality: newBio,
            }),
          });

          if (response.ok) {
            alert("Cập nhật thành công!");
            loadAuthors();
          } else {
            alert("Cập nhật thất bại!");
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      // PRICE FUNCTIONS
      async function loadPrices() {
        try {
          const response = await fetch(`${API_URL}/prices`);
          const prices = await response.json();

          let html = "";
          prices.forEach((price) => {
            html += `<div class="item">${price}</div>`;
          });
          document.getElementById("pricesList").innerHTML = html;
        } catch (error) {
          console.error(error);
          document.getElementById("pricesList").innerHTML =
            '<p style="color: red;">Lỗi kết nối!</p>';
        }
      }

      async function updatePrice() {
        const bookId = document.getElementById("priceBookId").value;
        const price = document.getElementById("priceValue").value;

        if (!bookId || !price) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}/prices/${bookId}?price=${price}`,
            {
              method: "PUT",
            },
          );

          if (response.ok) {
            alert("Cập nhật giá thành công!");
            loadPrices();
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function searchByPrice() {
        const min = document.getElementById("minPrice").value;
        const max = document.getElementById("maxPrice").value;

        if (!min || !max) {
          alert("Vui lòng nhập khoảng giá!");
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}/prices/range?min=${min}&max=${max}`,
          );
          const books = await response.json();

          let html = "";
          books.forEach((book) => {
            html += `<div class="item">${book}</div>`;
          });
          document.getElementById("pricesList").innerHTML = html;
        } catch (error) {
          console.error(error);
        }
      }

      async function getCheapestBook() {
        try {
          const response = await fetch(`${API_URL}/prices/cheapest`);
          const book = await response.json();
          document.getElementById("pricesList").innerHTML =
            `<div class="item" style="background: #d4edda; border-left-color: #28a745;">${book}</div>`;
        } catch (error) {
          console.error(error);
        }
      }

      async function getMostExpensiveBook() {
        try {
          const response = await fetch(`${API_URL}/prices/expensive`);
          const book = await response.json();
          document.getElementById("pricesList").innerHTML =
            `<div class="item" style="background: #f8d7da; border-left-color: #dc3545;">${book}</div>`;
        } catch (error) {
          console.error(error);
        }
      }
      window.onload = function () {
        loadAuthors();
        loadBooks();
        loadPrices();
      };
    </script>
  </body>
</html>
