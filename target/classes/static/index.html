<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Sách - REST API</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 12px 24px;
        border: none;
        background: rgb(114, 124, 181);
        cursor: pointer;
        border-radius: 8px;
        font-size: 1em;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .tab-btn.active {
        background: #667eea;
        color: white;
      }

      .tab-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .tab-content {
        display: none;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .tab-content.active {
        display: block;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1em;
        transition: border-color 0.3s ease;
      }

      input[type="range"] {
        padding: 0;
        height: 8px;
        width: 100%;
        -webkit-appearance: none;
        appearance: none;
        background: linear-gradient(to right, #667eea 0%, #667eea 100%);
        border-radius: 10px;
        outline: none;
      }

      input[type="number"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1.2em;
        font-weight: 600;
        text-align: center;
        transition: border-color 0.3s ease;
      }

      input[type="number"]:focus {
        outline: none;
        border-color: #667eea;
      }

      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: outer-spin-button;
        height: 30px;
      }

      .year-display {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .year-value {
        background: #667eea;
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        min-width: 80px;
        text-align: center;
        display: none;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        padding: 12px 24px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #764ba2;
        transform: translateY(-2px);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .data-display {
        margin-top: 30px;
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
      }

      .data-display h3 {
        margin-bottom: 15px;
        color: #333;
      }

      .item {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-left: 4px solid #667eea;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .item-actions {
        display: flex;
        gap: 10px;
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 0.85em;
      }

      .btn-delete {
        background: #e74c3c;
      }

      .btn-delete:hover {
        background: #c0392b;
      }

      .btn-edit {
        background: #f39c12;
      }

      .btn-edit:hover {
        background: #d68910;
      }

      .alert {
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: #667eea;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }

      .modal-content h2 {
        margin-bottom: 20px;
        color: #333;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .btn-cancel {
        background: #95a5a6;
      }

      .btn-cancel:hover {
        background: #7f8c8d;
      }

      .price-range-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-weight: 600;
        color: #333;
      }

      .price-range-value {
        background: #667eea;
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 0.9em;
      }

      .dual-range-slider {
        position: relative;
        height: 40px;
        margin: 10px 0 20px;
      }

      .dual-range-track {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 8px;
        background: #e0e0e0;
        border-radius: 10px;
        transform: translateY(-50%);
      }

      .dual-range-fill {
        position: absolute;
        top: 50%;
        height: 8px;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 10px;
        transform: translateY(-50%);
        pointer-events: none;
      }

      .dual-range-slider input[type="range"] {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        transform: translateY(-50%);
        background: transparent;
        pointer-events: none;
        margin: 0;
        z-index: 2;
      }

      .dual-range-slider input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #667eea;
        border: 3px solid white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        pointer-events: all;
      }

      .dual-range-slider input[type="range"]::-moz-range-thumb {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #667eea;
        border: 3px solid white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        pointer-events: all;
      }

      .dual-range-slider input[type="range"]::-webkit-slider-runnable-track {
        -webkit-appearance: none;
        background: transparent;
      }

      .dual-range-slider #maxPrice {
        z-index: 3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📚 Quản Lý Sách</h1>
      </header>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('authors')">
          👤 Tác Giả
        </button>
        <button class="tab-btn" onclick="switchTab('books')">📖 Sách</button>
        <button class="tab-btn" onclick="switchTab('prices')">
          💰 Giá Sách
        </button>
      </div>

      <!-- TAC GIA TAB -->
      <div id="authors" class="tab-content active">
        <h2>Quản Lý Tác Giả</h2>

        <div class="form-group">
          <label>Tên Tác Giả:</label>
          <input type="text" id="authorName" placeholder="Nhập tên tác giả" />
        </div>

        <div class="form-group">
          <label>Tiểu Sử / Quốc Tịch:</label>
          <textarea id="authorBio" placeholder="Nhập tiểu sử"></textarea>
        </div>

        <button onclick="addAuthor()">Thêm Tác Giả</button>

        <div class="data-display">
          <h3>Danh Sách Tác Giả</h3>
          <div id="authorsList" class="loading"></div>
        </div>
      </div>

      <!-- SACH TAB -->
      <div id="books" class="tab-content">
        <h2>Quản Lý Sách</h2>

        <div class="form-group">
          <label>Tiêu Đề:</label>
          <input type="text" id="bookTitle" placeholder="Nhập tiêu đề sách" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Năm Xuất Bản:</label>
            <input type="number" id="bookYear" placeholder="Chọn năm" />
          </div>
          <div class="form-group">
            <label>Tác Giả:</label>
            <select id="bookAuthorId">
              <option value="">-- Chọn tác giả --</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Giá Sách (VND):</label>
          <input
            type="number"
            id="bookPrice"
            placeholder="Ví dụ: 150000"
            min="1"
          />
        </div>

        <button onclick="addBook()">Thêm Sách</button>

        <div class="form-group" style="margin-top: 30px">
          <label>Tìm Kiếm Sách:</label>
          <input type="text" id="searchKeyword" placeholder="Nhập từ khóa..." />
          <button onclick="searchBooks()" style="margin-top: 10px">
            Tìm Kiếm
          </button>
        </div>

        <div class="data-display">
          <h3>Danh Sách Sách</h3>
          <div id="booksList" class="loading"></div>
        </div>
      </div>

      <!-- GIA SACH TAB -->
      <div id="prices" class="tab-content">
        <h2>Quản Lý Giá Sách</h2>

        <div class="form-row">
          <div class="form-group">
            <label>Tên Sách:</label>
            <select id="priceBookTitle">
              <option value="">-- Chọn sách --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Giá (VND):</label>
            <input type="number" id="priceValue" placeholder="Nhập giá" />
          </div>
        </div>

        <button onclick="updatePrice()">Cập Nhật Giá</button>

        <div class="form-group" style="margin-top: 30px">
          <label>Khoảng Giá Tìm Kiếm (VND)</label>
          <div class="price-range-header">
            <span class="price-range-value" id="priceRangeMinLabel">0 VND</span>
            <span>—</span>
            <span class="price-range-value" id="priceRangeMaxLabel"
              >500.000 VND</span
            >
          </div>
          <div class="dual-range-slider">
            <div class="dual-range-track">
              <div class="dual-range-fill" id="priceRangeFill"></div>
            </div>
            <input
              type="range"
              id="minPrice"
              min="0"
              max="1000000"
              step="10000"
              value="0"
            />
            <input
              type="range"
              id="maxPrice"
              min="0"
              max="1000000"
              step="10000"
              value="500000"
            />
          </div>
        </div>
        <button onclick="searchByPrice()">Tìm Sách Theo Giá</button>

        <div class="data-display">
          <h3>Giá Các Sách</h3>
          <div id="pricesList" class="loading"></div>
        </div>
      </div>
    </div>

    <div id="editBookModal" class="modal">
      <div class="modal-content">
        <h2>Sửa Sách</h2>
        <input type="hidden" id="editBookId" />

        <div class="form-group">
          <label>Tiêu Đề:</label>
          <input
            type="text"
            id="editBookTitle"
            placeholder="Nhập tiêu đề sách"
          />
        </div>

        <div class="form-group">
          <label>Năm Xuất Bản:</label>
          <input type="number" id="editBookYear" placeholder="Chọn năm" />
        </div>

        <div class="form-group">
          <label>Tác Giả:</label>
          <select id="editBookAuthorId">
            <option value="">-- Chọn tác giả --</option>
          </select>
        </div>

        <div class="modal-actions">
          <button onclick="saveEditBook()">Lưu</button>
          <button class="btn-cancel" onclick="closeEditBookModal()">Hủy</button>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8080/api";

      // Update year display when slider changes
      document.addEventListener("DOMContentLoaded", function () {
        const yearSlider = document.getElementById("bookYear");
        const yearDisplay = document.getElementById("yearDisplay");

        if (yearSlider && yearDisplay) {
          yearSlider.addEventListener("input", function () {
            yearDisplay.textContent = this.value;
          });
        }
      });

      // Switch between tabs
      function switchTab(tabName) {
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        document.getElementById(tabName).classList.add("active");
        event.target.classList.add("active");
      }

      // AUTHOR FUNCTIONS
      async function addAuthor() {
        const name = document.getElementById("authorName").value;
        const bio = document.getElementById("authorBio").value;

        if (!name || !bio) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/authors`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              authorName: name,
              nationality: bio,
            }),
          });

          if (response.ok) {
            alert("Thêm tác giả thành công!");
            document.getElementById("authorName").value = "";
            document.getElementById("authorBio").value = "";
            loadAuthors();
            populateBookAuthorSelect();
          } else {
            alert("Lỗi khi thêm tác giả!");
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function loadAuthors() {
        try {
          const response = await fetch(`${API_URL}/authors`);
          const authors = await response.json();

          let html = "";
          if (authors.length === 0) {
            html = "<p>Không có tác giả nào.</p>";
          } else {
            authors.forEach((author) => {
              html += `
                            <div class="item">
                                <div>
                                    <strong>ID: ${author.id}</strong> | <strong>${author.authorName}</strong>
                                    <p style="margin-top: 5px; color: #666;">${author.nationality}</p>
                                </div>
                                <div class="item-actions">
                                  <button class="btn-small btn-edit" onclick="editAuthor(${author.id}, '${author.authorName}', '${author.nationality}')">
                                    Sửa
                                  </button>
                                  <button class="btn-small btn-delete" onclick="deleteAuthor(${author.id})">
                                    Xóa
                                  </button>
                                </div>
                            </div>
                        `;
            });
          }
          document.getElementById("authorsList").innerHTML = html;
        } catch (error) {
          console.error(error);
          document.getElementById("authorsList").innerHTML =
            '<p style="color: red;">Lỗi kết nối!</p>';
        }
      }

      async function deleteAuthor(id) {
        if (!confirm("Bạn chắc chắn muốn xóa?")) return;

        try {
          const response = await fetch(`${API_URL}/authors/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("Xóa thành công!");
            loadAuthors();
          }
        } catch (error) {
          console.error(error);
        }
      }

      async function editAuthor(id, oldName, oldBio) {
        const newName = prompt("Nhập tên mới:", oldName);
        const newBio = prompt("Nhập quốc tịch mới:", oldBio);

        if (!newName || !newBio) return;

        try {
          const response = await fetch(`${API_URL}/authors/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              authorName: newName,
              nationality: newBio,
            }),
          });

          if (response.ok) {
            alert("Cập nhật thành công!");
            loadAuthors();
          } else {
            alert("Cập nhật thất bại!");
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function populateAuthorSelect(selectId, selectedId = "") {
        const select = document.getElementById(selectId);
        try {
          const response = await fetch(`${API_URL}/authors`);
          const authors = await response.json();
          select.innerHTML = '<option value="">-- Chọn tác giả --</option>';
          authors.forEach((author) => {
            const selected = author.id === selectedId ? "selected" : "";
            select.innerHTML += `<option value="${author.id}" ${selected}>${author.authorName}</option>`;
          });
        } catch (error) {
          console.error(error);
        }
      }

      async function populateBookAuthorSelect() {
        await populateAuthorSelect("bookAuthorId");
      }

      async function openEditBookModal(id, title, year, authorId) {
        document.getElementById("editBookId").value = id;
        document.getElementById("editBookTitle").value = title;
        document.getElementById("editBookYear").value = year;
        await populateAuthorSelect("editBookAuthorId", authorId);
        document.getElementById("editBookModal").classList.add("active");
      }

      function closeEditBookModal() {
        document.getElementById("editBookModal").classList.remove("active");
      }

      async function saveEditBook() {
        const id = document.getElementById("editBookId").value;
        const title = document.getElementById("editBookTitle").value.trim();
        const year = document.getElementById("editBookYear").value;
        const authorId = document.getElementById("editBookAuthorId").value;

        if (!title || !year || !authorId) {
          alert("Vui lòng nhập đầy đủ: tiêu đề, năm và tác giả!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/books/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              title: title,
              publishedYear: parseInt(year),
              authorId: parseInt(authorId),
            }),
          });

          if (response.ok) {
            alert("Cập nhật sách thành công!");
            closeEditBookModal();
            loadBooks();
            populatePriceBookSelect();
          } else {
            const errorText = await response.text();
            alert(errorText);
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      // BOOK FUNCTIONS
      async function addBook() {
        const title = document.getElementById("bookTitle").value;
        const year = document.getElementById("bookYear").value;
        const authorId = document.getElementById("bookAuthorId").value;
        const price = document.getElementById("bookPrice").value;

        if (!title || !year || !authorId || !price) {
          alert("Vui lòng nhập đầy đủ: tiêu đề, năm, tác giả và giá!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/books`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: title,
              publishedYear: parseInt(year),
              authorId: parseInt(authorId),
              price: parseFloat(price),
            }),
          });

          if (response.ok) {
            alert("Thêm sách thành công!");
            document.getElementById("bookTitle").value = "";
            const currentYear = new Date().getFullYear();
            document.getElementById("bookYear").value = currentYear;
            document.getElementById("bookAuthorId").value = "";
            document.getElementById("bookPrice").value = "";
            loadBooks();
            loadPrices();
            populatePriceBookSelect();
          } else {
            const errorText = await response.text();
            alert(errorText);
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function loadBooks() {
        try {
          const response = await fetch(`${API_URL}/books`);
          const books = await response.json();

          let html = "";
          if (books.length === 0) {
            html = "<p>Không có sách nào.</p>";
          } else {
            books.forEach((book) => {
              const authorLabel =
                book.authorName || `ID tác giả: ${book.authorId}`;
              const priceLabel =
                book.price > 0
                  ? book.price.toLocaleString("vi-VN") + " VND"
                  : "Chưa có giá";
              html += `
                            <div class="item">
                                <div>
                                    <strong>ID: ${book.id}</strong> | <strong>${book.title}</strong>
                                    <p style="margin-top: 5px; color: #666;">
                                      Năm: ${book.publishedYear} |
                                      Tác giả: ${authorLabel} |
                                      Giá: ${priceLabel}
                                    </p>
                                </div>
                                <div class="item-actions">
                                    <button class="btn-small btn-edit" onclick='openEditBookModal(${book.id}, ${JSON.stringify(book.title)}, ${book.publishedYear}, ${book.authorId})'>
                                        Sửa
                                    </button>
                                    <button class="btn-small btn-delete" onclick="deleteBook(${book.id})">
                                        Xóa
                                    </button>
                                </div>
                            </div>
                        `;
            });
          }
          document.getElementById("booksList").innerHTML = html;
        } catch (error) {
          console.error(error);
          document.getElementById("booksList").innerHTML =
            '<p style="color: red;">Lỗi kết nối!</p>';
        }
      }

      async function searchBooks() {
        const keyword = document.getElementById("searchKeyword").value;
        if (!keyword) {
          alert("Nhập từ khóa tìm kiếm!");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/books/search/${keyword}`);
          const books = await response.json();

          let html = "";
          if (books.length === 0) {
            html = "<p>Không tìm thấy sách nào!</p>";
          } else {
            books.forEach((book) => {
              html += `<div class="item"><strong>${book.title}</strong> (${book.publishedYear})</div>`;
            });
          }
          document.getElementById("booksList").innerHTML = html;
        } catch (error) {
          console.error(error);
        }
      }

      async function deleteBook(id) {
        if (!confirm("Bạn chắc chắn muốn xóa?")) return;

        try {
          const response = await fetch(`${API_URL}/books/${id}`, {
            method: "DELETE",
          });

          if (response.ok) {
            alert("Xóa thành công!");
            loadBooks();
            loadPrices();
            populatePriceBookSelect();
          }
        } catch (error) {
          console.error(error);
        }
      }

      async function editAuthor(id, oldName, oldBio) {
        const newName = prompt("Nhập tên mới:", oldName);
        const newBio = prompt("Nhập quốc tịch mới:", oldBio);

        if (!newName || !newBio) return;

        try {
          const response = await fetch(`${API_URL}/authors/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              authorName: newName,
              nationality: newBio,
            }),
          });

          if (response.ok) {
            alert("Cập nhật thành công!");
            loadAuthors();
          } else {
            alert("Cập nhật thất bại!");
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      async function populatePriceBookSelect() {
        const select = document.getElementById("priceBookTitle");
        try {
          const response = await fetch(`${API_URL}/books`);
          const books = await response.json();
          select.innerHTML = '<option value="">-- Chọn sách --</option>';
          books.forEach((book) => {
            const priceLabel =
              book.price > 0
                ? ` (${book.price.toLocaleString("vi-VN")} VND)`
                : "";
            select.innerHTML += `<option value="${book.id}">${book.title}${priceLabel}</option>`;
          });
        } catch (error) {
          console.error(error);
        }
      }

      // PRICE FUNCTIONS
      async function loadPrices() {
        try {
          const response = await fetch(`${API_URL}/prices`);
          const prices = await response.json();

          let html = "";
          prices.forEach((price) => {
            html += `<div class="item">${price}</div>`;
          });
          document.getElementById("pricesList").innerHTML = html;
        } catch (error) {
          console.error(error);
          document.getElementById("pricesList").innerHTML =
            '<p style="color: red;">Lỗi kết nối!</p>';
        }
      }

      async function updatePrice() {
        const bookId = document.getElementById("priceBookTitle").value;
        const price = document.getElementById("priceValue").value;

        if (!bookId || !price) {
          alert("Vui lòng chọn sách và nhập giá!");
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}/prices/${bookId}?price=${price}`,
            {
              method: "PUT",
            },
          );

          if (response.ok) {
            alert("Cập nhật giá thành công!");
            document.getElementById("priceValue").value = "";
            loadPrices();
            populatePriceBookSelect();
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối!");
        }
      }

      function formatPriceVnd(value) {
        return parseInt(value, 10).toLocaleString("vi-VN") + " VND";
      }

      function initPriceRangeSlider() {
        const minSlider = document.getElementById("minPrice");
        const maxSlider = document.getElementById("maxPrice");
        const minLabel = document.getElementById("priceRangeMinLabel");
        const maxLabel = document.getElementById("priceRangeMaxLabel");
        const fill = document.getElementById("priceRangeFill");

        function updatePriceRangeSlider(event) {
          let minVal = parseInt(minSlider.value, 10);
          let maxVal = parseInt(maxSlider.value, 10);

          if (minVal > maxVal) {
            if (event && event.target === minSlider) {
              minVal = maxVal;
              minSlider.value = maxVal;
            } else {
              maxVal = minVal;
              maxSlider.value = minVal;
            }
          }

          minLabel.textContent = formatPriceVnd(minSlider.value);
          maxLabel.textContent = formatPriceVnd(maxSlider.value);

          const rangeMin = parseInt(minSlider.min, 10);
          const rangeMax = parseInt(minSlider.max, 10);
          const minPercent =
            ((minSlider.value - rangeMin) / (rangeMax - rangeMin)) * 100;
          const maxPercent =
            ((maxSlider.value - rangeMin) / (rangeMax - rangeMin)) * 100;
          fill.style.left = minPercent + "%";
          fill.style.width = maxPercent - minPercent + "%";
        }

        minSlider.addEventListener("input", updatePriceRangeSlider);
        maxSlider.addEventListener("input", updatePriceRangeSlider);
        updatePriceRangeSlider();
      }

      async function searchByPrice() {
        const min = document.getElementById("minPrice").value;
        const max = document.getElementById("maxPrice").value;

        if (parseInt(min, 10) > parseInt(max, 10)) {
          alert("Giá tối thiểu không được lớn hơn giá tối đa!");
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}/prices/range?min=${min}&max=${max}`,
          );
          const books = await response.json();

          let html = "";
          books.forEach((book) => {
            html += `<div class="item">${book}</div>`;
          });
          document.getElementById("pricesList").innerHTML = html;
        } catch (error) {
          console.error(error);
        }
      }

      async function getCheapestBook() {
        try {
          const response = await fetch(`${API_URL}/prices/cheapest`);
          const book = await response.json();
          document.getElementById("pricesList").innerHTML =
            `<div class="item" style="background: #d4edda; border-left-color: #28a745;">${book}</div>`;
        } catch (error) {
          console.error(error);
        }
      }

      async function getMostExpensiveBook() {
        try {
          const response = await fetch(`${API_URL}/prices/expensive`);
          const book = await response.json();
          document.getElementById("pricesList").innerHTML =
            `<div class="item" style="background: #f8d7da; border-left-color: #dc3545;">${book}</div>`;
        } catch (error) {
          console.error(error);
        }
      }
      window.onload = function () {
        initPriceRangeSlider();
        loadAuthors();
        populateBookAuthorSelect();
        populatePriceBookSelect();
        loadBooks();
        loadPrices();
      };
      const yearInput = document.getElementById("bookYear");
      yearInput.addEventListener("input", function () {
        const currentYear = new Date().getFullYear();

        if (this.value > currentYear) {
          this.value = currentYear;
          alert("Năm không được vượt quá năm hiện tại!");
        }
      });
    </script>
  </body>
</html>
